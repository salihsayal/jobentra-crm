services:
  postgres:
    image: postgres:15-alpine
    container_name: crm-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - jobentra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY}
      DEMO_EMAIL: ${DEMO_EMAIL}
      DEMO_PASSWORD: ${DEMO_PASSWORD}
      CANDIDATE_FILES_PATH: /data/candidates
    ports:
      - "8080:8080"
    volumes:
      - ./appdata/documents:/data/candidates
    networks:
      - jobentra-network
    depends_on:
      postgres:
        condition: service_healthy

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: crm-ai-service
    environment:
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY}
      AI_SERVICE_PUBLIC_URL: ${AI_SERVICE_PUBLIC_URL}
      ALLOWED_ORIGINS: http://backend:8080,http://localhost:8080
      DOCUMENTS_DIR: /data/candidates
      OLLAMA_URL: http://ollama:11434
    ports:
      - "8000:8000"
    volumes:
      - ./appdata/documents:/data/candidates
    networks:
      - jobentra-network

  ollama:
    image: ollama/ollama:latest
    container_name: crm-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - jobentra-network
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull qwen2.5-coder:7b
        wait

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm-frontend
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    networks:
      - jobentra-network
    depends_on:
      - backend

volumes:
  pgdata:
  ollama-data:

networks:
  jobentra-network:
    driver: bridge
