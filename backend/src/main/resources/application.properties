server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jobentra_crm}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:crmuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:crmpass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
ai.service.api-key=${AI_SERVICE_API_KEY:dev-secret-key}

demo.email=${DEMO_EMAIL:admin@jobentra.com}
demo.password=${DEMO_PASSWORD:admin123}
